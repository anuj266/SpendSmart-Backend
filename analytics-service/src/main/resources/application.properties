# ?????????????????????????????????????????????????????????????
#  analytics-service ? local dev configuration
#  FIX: port was wrongly set to 8086 (collision with category-service).
#       Corrected to 8084 to match docker-compose and spendsmart-web.
# ?????????????????????????????????????????????????????????????

server.port=8084

# ?? Database (local MySQL) ?????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/analytics_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?? RabbitMQ (Docker container, reachable via localhost) ???????
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
