# ?????????????????????????????????????????????????????????????
#  budget-service ? local dev configuration
#  FIX: SPRING_RABBITMQ_HOST env-var default was "rabbitmq" (Docker
#       hostname). Hardcoded to localhost so no env-var is needed
#       when running manually.
# ?????????????????????????????????????????????????????????????

server.port=8085

# ?? Database (local MySQL) ?????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/budget_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?? Scheduling ????????????????????????????????????????????????
spring.task.scheduling.enabled=true

# ?? RabbitMQ (Docker container, reachable via localhost) ???????
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
