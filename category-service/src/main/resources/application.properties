# ?????????????????????????????????????????????????????????????
#  category-service ? local dev configuration
#  FIX: Removed Eureka client config (no Eureka server running
#       locally). Services communicate via direct localhost URLs.
#       Added RabbitMQ config (was missing, docker-compose had it).
# ?????????????????????????????????????????????????????????????

server.port=8086

# ?? Database (local MySQL) ?????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/category_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ?? RabbitMQ (Docker container, reachable via localhost) ???????
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ?? Logging ??????????????????????????????????????????????????
logging.level.com.spendsmart.category=DEBUG

# ?? Eureka DISABLED for local dev (no Eureka server) ??????????
# If you later want Eureka, start a eureka-server and uncomment:
# eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# eureka.instance.prefer-ip-address=true
eureka.client.enabled=false
