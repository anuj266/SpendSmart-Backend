# ?????????????????????????????????????????????????????????????
#  expense-service ? local dev configuration
#  FIX: spring.rabbitmq.host was ${SPRING_RABBITMQ_HOST:localhost}
#       which resolves to "localhost" only if the env-var is absent.
#       Made explicit so it always uses localhost without any env-var.
# ?????????????????????????????????????????????????????????????

server.port=8082

spring.application.name=expense-service

# ?? Database (local MySQL) ?????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/expense_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ?? RabbitMQ (Docker container, reachable via localhost) ???????
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
