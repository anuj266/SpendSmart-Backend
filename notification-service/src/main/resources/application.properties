# ?????????????????????????????????????????????????????????????
#  notification-service ? local dev configuration
#  FIX: spring.rabbitmq.host hardcoded to localhost (was env-var
#       defaulting to "rabbitmq" Docker hostname).
# ?????????????????????????????????????????????????????????????

server.port=8088

# ?? Database (local MySQL) ?????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?? RabbitMQ (Docker container, reachable via localhost) ???????
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# ?? Logging ??????????????????????????????????????????????????
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
